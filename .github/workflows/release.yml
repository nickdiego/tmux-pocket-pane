name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck tmux-pocket-pane.tmux scripts/pocket-pane.sh

      - name: shfmt
        run: |
          sudo apt-get install -y shfmt
          shfmt --diff tmux-pocket-pane.tmux scripts/pocket-pane.sh

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
